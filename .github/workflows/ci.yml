name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore WindowsPerformance.sln

      - name: Build
        run: dotnet build WindowsPerformance.sln --no-restore -c Release
        env:
          SKIP_SIGNING: "1"

      - name: Test with coverage
        run: dotnet test WindowsPerformance.sln --no-build -c Release --collect:"XPlat Code Coverage" --results-directory ./TestResults
        env:
          SKIP_SIGNING: "1"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
